<!DOCTYPE html>
<html>
    <head>
        <title>Modified text using DOM</title>
    </head>
    <body>
        <h1 id="IntroText">Hello Students</h1>
        <script>
            let element=document.getElementById("IntroText")
            element.style.color ="green";
            element.style.backgroundColor="yellow";
        </script>
    </body>
</html>
