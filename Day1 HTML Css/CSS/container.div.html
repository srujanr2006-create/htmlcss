<!DOCTYPE html>
<html>
    <head>
        <title>Grid Example</title>
        <style>
            .container{
                display:grid;
                grid-template-columns: auto auto auto;
                padding: 10px;
                background-color: rgb(32, 29, 28);
                text-align: center;
            }
            .container div{
                font-size: 20px;
                border: 1px solid black;
                border-color: rgb(173, 10, 192);
                background-color: rgb(220, 217, 212);
                padding: 30px;
            }
        </style>
    </head>
    <body>
        <div class ="container">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </body>
</html>
